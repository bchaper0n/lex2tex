<!DOCTYPE html>
<html>
 <head>
   <base target="_top">
   <link rel="stylesheet" href="https://ssl.gstatic.com/docs/script/css/add-ons1.css">
 </head>
 <script>

  function setColumns(cb) {
    
    if (cb.checked){
      google.script.run.withSuccessHandler(setColumnNames).getColumnNames();
    }
    else {
      google.script.run.withSuccessHandler(setColumnLetters).getColumnLetters();
    }

  }

  function setColumnNames(colNames) {
    
    const dropdownIds = ['judgment_col', 'target_col', 'morph_col', 'gloss_col', 'trans_col'];

    for (let i = 0; i < dropdownIds.length; i++){
      document.getElementById(dropdownIds[i]).innerHTML = colNames;
    }
  }

  function setColumnLetters(colLetters) {

    const dropdownIds = ['judgment_col', 'target_col', 'morph_col', 'gloss_col', 'trans_col'];

    for (let i = 0; i < dropdownIds.length; i++){
      document.getElementById(dropdownIds[i]).innerHTML = colLetters;
    }

  }

  google.script.run.withSuccessHandler(setColumnNames).getColumnNames();
  </script>
 <body>
    <div>
      <input type="checkbox" id="col_names" onclick="setColumns(this);" checked>
      <label for="col_names">Use first row as column names?</label>
    </div>

    <!-- judgment -->
    <label for="judgment_col"><i>Judgment</i> column:</label>
    <select name="judgment_col" id="judgment_col"></select><br><br>

    <!-- target sentence -->
    <label for="target_col"><i>Target Sentence</i> column:</label>
    <select name="target_col" id="target_col"></select><br><br>

    <!-- morpheme break -->
    <label for="morph_col"><i>Morpheme Break</i> column:</label>
    <select name="morph_col" id="morph_col"></select><br><br>

    <!-- gloss -->
    <label for="gloss_col"><i>Gloss</i> column:</label>
    <select name="gloss_col" id="gloss_col"></select><br><br>

    <!-- translation -->
    <label for="trans_col"><i>Translation</i> column:</label>
    <select name="trans_col" id="trans_col"></select><br><br>

    <input type="button" class="action" value="Export" onclick="google.script.run.getExportColumns(this);"/>
    <input type="button" value="Cancel" onclick="google.script.host.close();"/>

 </body>
</html>
